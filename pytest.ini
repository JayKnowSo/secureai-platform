[pytest]
# Root directory for test discovery
pythonpath = .

# Default test options
# -v = verbose, show each test name
# --tb=short = short traceback on failures
addopts = -v --tb=short

# Test file discovery pattern
testpaths = tests

# Environment variables for testing
# Prevents tests from needing real API keys
env =
    ANTHROPIC_API_KEY=test-mock-key
    SECUREAI_SEVERITY_THRESHOLD=HIGH