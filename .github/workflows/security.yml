# SecureAI Platform — CI/CD Security Pipeline
# Runs on every push and pull request to main
# Two jobs: test suite first, then self-scan
# SecureAI scans itself — eating its own dog food

name: SecureAI Security Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run test suite
        env:
          ANTHROPIC_API_KEY: test-mock-key
          SECUREAI_SEVERITY_THRESHOLD: HIGH
        run: |
          pytest tests/ --tb=short -q

  self-scan:
    name: SecureAI Self-Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install SecureAI
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Scan for secrets
        env:
          ANTHROPIC_API_KEY: test-mock-key
        run: |
          secureai scan secrets --path ./

      - name: Scan Docker config
        env:
          ANTHROPIC_API_KEY: test-mock-key
        run: |
          secureai scan docker --path ./
